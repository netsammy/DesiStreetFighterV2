<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A Pakistani 2.5D action brawler with fighters, stages, keyboard controls, touch controls, and gamepad support." />
    <meta name="theme-color" content="#160904" />
    <link rel="manifest" href="/DesiStreetFighterV2/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="512x512" href="/DesiStreetFighterV2/icons/app-icon-512.png" />
    <title>Loading...</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        overflow: hidden; background: #0a0a0a; color: #f5e9c9;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }
      #game-root { position: relative; width: 100vw; height: 100vh; }
      #game-canvas { display: block; width: 100%; height: 100%; outline: none; }
      #boot-overlay {
        position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
        padding: 8px 18px; background: rgba(20, 12, 6, 0.65);
        border: 1px solid #c79b3a; border-radius: 6px;
        font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase;
        color: #ffd770; pointer-events: none; z-index: 10;
        max-width: min(720px, calc(100vw - 28px));
        text-align: center;
        line-height: 1.25;
      }
      #boot-overlay.match-help {
        top: 8px;
        padding: 4px 9px;
        max-width: min(440px, 44vw);
        font-size: 10px;
        line-height: 1.12;
        letter-spacing: 0.04em;
        background: rgba(20, 12, 6, 0.56);
      }
      #boot-overlay.match-help .match-title {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #boot-overlay.match-help .match-controls {
        display: block;
        margin-top: 2px;
        font-size: 8px;
        color: rgba(245, 233, 201, 0.82);
        letter-spacing: 0.02em;
        text-transform: none;
      }
      #boot-overlay.match-help span {
        font-size: 9px !important;
        line-height: 1.12 !important;
        letter-spacing: 0.03em !important;
        color: rgba(245, 233, 201, 0.82) !important;
        opacity: 0.82 !important;
      }
      #boot-overlay.match-help br {
        display: none;
      }
      @media (orientation: landscape) and (max-height: 520px) {
        #boot-overlay.match-help {
          top: 6px;
          max-width: min(360px, 36vw);
          padding: 3px 8px;
          font-size: 9px;
          line-height: 1.12;
        }
        #boot-overlay.match-help .match-controls {
          font-size: 7px;
        }
        #boot-overlay.match-help span {
          font-size: 7px !important;
        }
      }
      #ui-root { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
    </style>
    <script type="module" crossorigin src="/DesiStreetFighterV2/assets/main-CxmKwGFe.js"></script>
    <link rel="modulepreload" crossorigin href="/DesiStreetFighterV2/assets/characters-D8N9RxgT.js">
  </head>
  <body>
    <div id="game-root">
      <canvas id="game-canvas" tabindex="0"></canvas>
      <div id="ui-root"></div>
      <div id="boot-overlay">Loading...</div>
    </div>
    <script>
      if ('serviceWorker' in navigator && location.protocol === 'https:') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/DesiStreetFighterV2/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
