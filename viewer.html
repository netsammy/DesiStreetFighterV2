<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animation Viewer — Desi Street Fighter</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        overflow: hidden; background: #0a0a0a; color: #f5e9c9;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        font-size: 13px;
      }
      #app { display: grid; height: 100vh;
        grid-template-columns: 200px 1fr 280px; }
      .panel {
        background: rgba(20, 12, 6, 0.85);
        border-right: 1px solid #5a3a18;
        padding: 14px 12px;
        overflow-y: auto;
      }
      .panel h2 {
        font-size: 12px; letter-spacing: 0.18em;
        text-transform: uppercase; color: #c79b3a;
        margin: 0 0 10px 0; border-bottom: 1px solid #5a3a18; padding-bottom: 6px;
      }
      .item {
        padding: 7px 10px; margin: 2px 0;
        border: 1px solid transparent; border-radius: 5px;
        cursor: pointer; user-select: none;
        transition: background 80ms ease, border-color 80ms ease;
      }
      .item:hover { background: rgba(199, 155, 58, 0.12); border-color: #5a3a18; }
      .item.active {
        background: linear-gradient(180deg, #3a2510, #2a1a0c);
        border-color: #c79b3a; color: #ffd770;
      }
      .item .meta { font-size: 11px; color: #8a7456; margin-top: 2px; }
      .item.has-note::after {
        content: ' ●'; color: #c79b3a; font-size: 10px;
      }
      #stage { position: relative; background: #1a1208; }
      #canvas { display: block; width: 100%; height: 100%; }
      #overlay {
        position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
        background: rgba(20, 12, 6, 0.8); border: 1px solid #c79b3a;
        border-radius: 6px; padding: 6px 14px; font-size: 13px;
        letter-spacing: 0.08em; text-transform: uppercase; color: #ffd770;
        pointer-events: none; white-space: nowrap;
      }
      #ctrls {
        position: absolute; bottom: 14px; left: 14px; right: 14px;
        background: rgba(20, 12, 6, 0.85); border: 1px solid #5a3a18;
        border-radius: 8px; padding: 10px 14px;
        display: flex; align-items: center; gap: 14px;
      }
      #ctrls label { font-size: 11px; color: #c79b3a; letter-spacing: 0.08em; }
      #ctrls input[type="range"] { width: 110px; accent-color: #c79b3a; }
      #ctrls button {
        background: linear-gradient(180deg, #2a1a0c, #1a0f06);
        color: #f5e9c9; border: 1.5px solid #c79b3a; border-radius: 6px;
        padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: inherit;
      }
      #ctrls button:hover { background: linear-gradient(180deg, #3a2510, #2a1a0c); }
      .right h2 { margin-top: 18px; }
      .right h2:first-child { margin-top: 0; }
      textarea {
        width: 100%; min-height: 110px;
        background: #1a0f06; color: #f5e9c9;
        border: 1.5px solid #5a3a18; border-radius: 6px;
        padding: 8px; font-family: inherit; font-size: 12px;
        resize: vertical;
      }
      textarea:focus { border-color: #c79b3a; outline: none; }
      .row {
        display: flex; align-items: center; justify-content: space-between;
        margin: 4px 0; font-size: 12px;
      }
      .row .k { color: #8a7456; }
      .row .v { color: #f5e9c9; font-variant-numeric: tabular-nums; }
      .export-row { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
      .export-row button { flex: 1; }
      .warn { color: #ff9966; font-size: 11px; margin-top: 6px; }
    </style>
    <script type="module" crossorigin src="/DesiStreetFighterV2/assets/viewer-U3ECHU-z.js"></script>
    <link rel="modulepreload" crossorigin href="/DesiStreetFighterV2/assets/characters-D8N9RxgT.js">
  </head>
  <body>
    <div id="app">
      <aside class="panel left">
        <h2>Characters</h2>
        <div id="char-list"></div>

        <h2 style="margin-top:18px;">Animations</h2>
        <div id="anim-list"></div>
      </aside>

      <main id="stage">
        <canvas id="canvas" tabindex="0"></canvas>
        <div id="overlay">Pick a character</div>
        <div id="ctrls">
          <button id="play-btn">⏸ Pause</button>
          <label>Speed
            <input id="speed" type="range" min="0.1" max="2" step="0.05" value="1" />
            <span id="speed-val" class="v">1.00x</span>
          </label>
          <label>Loop
            <input id="loop" type="checkbox" checked />
          </label>
          <label style="flex:1;">Frame
            <input id="scrub" type="range" min="0" max="100" step="0.01" value="0" style="width:auto;flex:1;" />
            <span id="frame-val" class="v">0 / 0</span>
          </label>
        </div>
      </main>

      <aside class="panel right">
        <h2>Current</h2>
        <div class="row"><span class="k">Character</span> <span class="v" id="cur-char">—</span></div>
        <div class="row"><span class="k">Animation</span> <span class="v" id="cur-anim">—</span></div>
        <div class="row"><span class="k">Duration</span> <span class="v" id="cur-dur">—</span></div>
        <div class="row"><span class="k">Source</span> <span class="v" id="cur-src">—</span></div>

        <h2>Feedback</h2>
        <textarea id="notes" placeholder="Notes for this animation — what to fix, what reads wrong, what's good. Autosaves as you type."></textarea>
        <div class="warn">Saved locally per character+animation. Click Export below to download all notes as JSON.</div>

        <h2>All Notes</h2>
        <div id="notes-summary" style="font-size:11px; color:#8a7456; line-height:1.5;">No notes yet.</div>
        <div class="export-row">
          <button id="export-json">Download JSON</button>
          <button id="clear-notes" title="Clear all notes for every character">Clear All</button>
        </div>
      </aside>
    </div>

  </body>
</html>
